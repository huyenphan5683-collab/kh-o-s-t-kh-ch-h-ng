# =========================
# FUNCTIONS
# =========================

def choose_company():
    """
    Chọn công ty theo trọng số.
    Nhóm Trasas, Vĩnh Tường, Sabeco, La Vie, FML xuất hiện nhiều hơn
    vì đây là nhóm khách hàng thường feedback / phát sinh vận hành nhiều.
    """
    group = np.random.choice(
        ["core", "regular", "other"],
        p=[0.45, 0.35, 0.20]
    )

    if group == "core":
        return random.choice(CORE_CUSTOMERS)
    elif group == "regular":
        return random.choice(REGULAR_CUSTOMERS)
    else:
        return random.choice(OTHER_CUSTOMERS)


def likert_score(mean, scale_max=5):
    """
    Sinh điểm Likert quanh mức trung bình mục tiêu.
    Có độ phân tán vừa phải để dữ liệu không bị quá đẹp.
    """
    score = int(round(np.random.normal(loc=mean, scale=0.82)))
    return max(1, min(scale_max, score))


def choose_functions(company):
    """
    Khách hàng lớn/vận hành nhiều thường dùng nhiều module hơn.
    """
    if company in CORE_CUSTOMERS:
        k = np.random.choice([3, 4, 5, 6], p=[0.15, 0.35, 0.35, 0.15])
    elif company in REGULAR_CUSTOMERS:
        k = np.random.choice([2, 3, 4, 5], p=[0.15, 0.35, 0.35, 0.15])
    else:
        k = np.random.choice([1, 2, 3, 4], p=[0.15, 0.40, 0.30, 0.15])

    k = min(k, len(FUNCTIONS))
    return "; ".join(random.sample(FUNCTIONS, k))


def adjust_profile_for_customer(base_profile, company):
    """
    Nhóm khách hàng thường phát sinh vận hành nhiều có xu hướng đánh giá khắt khe hơn
    ở tốc độ hệ thống, chất lượng xử lý và hiểu biết quy trình vận hành.
    """
    profile = base_profile.copy()

    if company in CORE_CUSTOMERS:
        profile["system_speed"] -= 0.10
        profile["support_resolution"] -= 0.08
        profile["business_process_knowledge"] -= 0.10
    elif company in REGULAR_CUSTOMERS:
        profile["system_speed"] -= 0.04
        profile["support_resolution"] -= 0.03

    return profile


def get_theme_and_comment(row):
    weak = []

    if row["Tốc độ phản hồi của hệ thống"] <= 3:
        weak.append("system_speed")
    if row["Giao diện hệ thống"] <= 3:
        weak.append("interface")
    if row["Tính năng hệ thống"] <= 3:
        weak.append("features")
    if row["Thời gian phản hồi của đội hỗ trợ"] <= 3:
        weak.append("support_response")
    if row["Câu trả lời của đội hỗ trợ giải quyết được vấn đề"] <= 3:
        weak.append("support_resolution")
    if row["Nhân viên hỗ trợ có hiểu biết về quy trình vận hành của doanh nghiệp"] <= 3:
        weak.append("business_process_knowledge")

    if not weak:
        weak = [random.choice(["features", "support_response", "support_resolution", "interface"])]

    theme = random.choice(weak)
    comment = random.choice(IMPROVEMENT_COMMENTS[theme])
    return theme, THEME_LABELS_VI[theme], comment


def satisfaction_group(avg_score):
    """
    Phân loại dựa trên điểm trung bình nhiều tiêu chí.
    Ngưỡng >= 3.6 hợp lý hơn >= 4 vì đây là điểm trung bình tổng hợp,
    không phải một câu CSAT đơn lẻ.
    """
    if avg_score >= 3.6:
        return "Satisfied"
    elif avg_score >= 2.8:
        return "Neutral"
    else:
        return "Dissatisfied"


# =========================
# GENERATE RAW SURVEY DATA
# =========================

rows = []

for year, n in RESPONSES_BY_YEAR.items():
    for i in range(1, n + 1):
        company = choose_company()
        profile = adjust_profile_for_customer(YEAR_PROFILES[year], company)

        row = {
            "Năm khảo sát": year,
            "Mã phản hồi": f"SV-{year}-{i:03d}",
            "Anh/chị hãy cho biết tên công ty của anh/chị": company,
            "Anh/chị hãy cho biết chức vụ hiện tại của anh/chị": random.choice(POSITIONS),
            "Những chức năng mà anh/chị đang sử dụng trên hệ thống": choose_functions(company),

            # Theo đúng form khảo sát mẫu
            "Tốc độ phản hồi của hệ thống": likert_score(profile["system_speed"], 5),
            "Giao diện hệ thống": likert_score(profile["interface"], 5),
            "Tính năng hệ thống": likert_score(profile["features"], 5),
            "Thời gian phản hồi của đội hỗ trợ": likert_score(profile["support_response"], 5),
            "Câu trả lời của đội hỗ trợ giải quyết được vấn đề": likert_score(profile["support_resolution"], 5),

            # Theo form gốc: câu này thang 1-6
            "Nhân viên hỗ trợ có hiểu biết về hệ thống": likert_score(profile["system_knowledge"], 6),

            "Nhân viên hỗ trợ có hiểu biết về quy trình vận hành của doanh nghiệp": likert_score(
                profile["business_process_knowledge"], 5
            ),
        }

        # Quy đổi câu thang 6 về thang 5 để tính Average CSAT chung
        normalized_system_knowledge = row["Nhân viên hỗ trợ có hiểu biết về hệ thống"] / 6 * 5

        csat_items = [
            row["Tốc độ phản hồi của hệ thống"],
            row["Giao diện hệ thống"],
            row["Tính năng hệ thống"],
            row["Thời gian phản hồi của đội hỗ trợ"],
            row["Câu trả lời của đội hỗ trợ giải quyết được vấn đề"],
            normalized_system_knowledge,
            row["Nhân viên hỗ trợ có hiểu biết về quy trình vận hành của doanh nghiệp"]
        ]

        avg_csat = round(float(np.mean(csat_items)), 2)

        row["Average CSAT"] = avg_csat
        row["Satisfaction Group"] = satisfaction_group(avg_csat)

        theme_code, theme_vi, comment = get_theme_and_comment(row)
        row["Feedback Theme Code"] = theme_code
        row["Feedback Theme"] = theme_vi
        row["Để nâng cao chất lượng dịch vụ, Smartlog nên cải thiện những gì?"] = comment

        rows.append(row)

df = pd.DataFrame(rows)


# =========================
# SUMMARY TABLES
# =========================

summary_year = df.groupby("Năm khảo sát").agg(
    Customer_Base=("Mã phản hồi", lambda x: CUSTOMER_BASE_BY_YEAR[x.name]),
    Survey_Responses=("Mã phản hồi", "count"),
    Average_CSAT=("Average CSAT", "mean"),
    Satisfied_Rate=("Satisfaction Group", lambda x: (x == "Satisfied").mean()),
    Neutral_Rate=("Satisfaction Group", lambda x: (x == "Neutral").mean()),
    Dissatisfied_Rate=("Satisfaction Group", lambda x: (x == "Dissatisfied").mean()),
    Avg_System_Speed=("Tốc độ phản hồi của hệ thống", "mean"),
    Avg_Interface=("Giao diện hệ thống", "mean"),
    Avg_Features=("Tính năng hệ thống", "mean"),
    Avg_Support_Response=("Thời gian phản hồi của đội hỗ trợ", "mean"),
    Avg_Support_Resolution=("Câu trả lời của đội hỗ trợ giải quyết được vấn đề", "mean"),
    Avg_System_Knowledge=("Nhân viên hỗ trợ có hiểu biết về hệ thống", "mean"),
    Avg_Business_Process_Knowledge=("Nhân viên hỗ trợ có hiểu biết về quy trình vận hành của doanh nghiệp", "mean")
).reset_index()

summary_year["Survey_Coverage"] = summary_year["Survey_Responses"] / summary_year["Customer_Base"]

for col in summary_year.columns:
    if col not in ["Năm khảo sát", "Customer_Base", "Survey_Responses"]:
        summary_year[col] = summary_year[col].round(4)

# Summary theo nhóm hài lòng
satisfaction_summary = (
    df.groupby(["Năm khảo sát", "Satisfaction Group"])
    .size()
    .reset_index(name="Count")
)

satisfaction_summary["Share"] = satisfaction_summary.groupby("Năm khảo sát")["Count"].transform(lambda x: x / x.sum())
satisfaction_summary["Share"] = satisfaction_summary["Share"].round(4)

# Summary feedback theme
theme_summary = (
    df.groupby(["Năm khảo sát", "Feedback Theme"])
    .size()
    .reset_index(name="Count")
)

theme_summary["Theme Share"] = theme_summary.groupby("Năm khảo sát")["Count"].transform(lambda x: x / x.sum())
theme_summary["Theme Share"] = theme_summary["Theme Share"].round(4)

# Summary customer response frequency
customer_summary = (
    df.groupby(["Năm khảo sát", "Anh/chị hãy cho biết tên công ty của anh/chị"])
    .size()
    .reset_index(name="Response Count")
    .sort_values(["Năm khảo sát", "Response Count"], ascending=[True, False])
)

customer_summary["Response Share"] = customer_summary.groupby("Năm khảo sát")["Response Count"].transform(lambda x: x / x.sum())
customer_summary["Response Share"] = customer_summary["Response Share"].round(4)

# Summary function usage
function_rows = []
for _, r in df.iterrows():
    for fn in r["Những chức năng mà anh/chị đang sử dụng trên hệ thống"].split("; "):
        function_rows.append({
            "Năm khảo sát": r["Năm khảo sát"],
            "Mã phản hồi": r["Mã phản hồi"],
            "Function": fn
        })

function_df = pd.DataFrame(function_rows)

function_summary = (
    function_df.groupby(["Năm khảo sát", "Function"])
    .size()
    .reset_index(name="Count")
)

function_summary["Function Share"] = function_summary.groupby("Năm khảo sát")["Count"].transform(lambda x: x / x.sum())
function_summary["Function Share"] = function_summary["Function Share"].round(4)


# =========================
# EXPORT
# =========================

with pd.ExcelWriter(OUTPUT_FILE, engine="openpyxl") as writer:
    df.to_excel(writer, sheet_name="1. Survey Raw Data", index=False)
    summary_year.to_excel(writer, sheet_name="2. Yearly Summary", index=False)
    satisfaction_summary.to_excel(writer, sheet_name="3. Satisfaction Group", index=False)
    theme_summary.to_excel(writer, sheet_name="4. Feedback Theme", index=False)
    customer_summary.to_excel(writer, sheet_name="5. Customer Responses", index=False)
    function_summary.to_excel(writer, sheet_name="6. Function Usage", index=False)

print(f"Generated file: {OUTPUT_FILE}")
print("\n=== Yearly Summary ===")
print(summary_year)

print("\n=== Customer Response Summary ===")
print(customer_summary.head(20))
